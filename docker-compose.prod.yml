services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-8080}:8080"
    env_file:
      - .env
    restart: unless-stopped

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    command: ["./server", "--migrate-only"]
    profiles:
      - migrate
