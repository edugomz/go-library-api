<!DOCTYPE html>
<html>
<head>
    <title>{{.book.Title}} - Library</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body>
    {{template "nav" .}}
    <main>
        <p><a href="/books">&larr; Back to books</a></p>
        <h1>{{.book.Title}}</h1>
        {{if .author}}
            <p>by <a href="/authors/{{.author.ID}}">{{.author.Name}}</a></p>
        {{end}}
    </main>
</body>
</html>
