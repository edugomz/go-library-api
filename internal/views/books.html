<!DOCTYPE html>
<html>
<head>
    <title>Library</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }
        .book {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }
    </style>
</head>

<body>
    <h1>📚 Book Library</h1>

    {{range .books}}
        <div class="book">
            <strong>{{.Title}}</strong><br>
            <small>Author ID: {{.AuthorID}}</small>
        </div>
    {{else}}
        <p>No books found.</p>
    {{end}}

</body>
</html>
