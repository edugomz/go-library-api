<!DOCTYPE html>
<html>
<head>
    <title>Authors - Library</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body>
    {{template "nav" .}}
    <main>
        <h1>Authors</h1>
        <ul class="list">
        {{range .authors}}
            <li><a href="/authors/{{.ID}}">{{.Name}}</a></li>
        {{else}}
            <li>No authors found.</li>
        {{end}}
        </ul>
    </main>
</body>
</html>
