name: Test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Start test database
        run: docker compose -f docker-compose.test.yml up -d

      - name: Wait for test database
        run: |
          for i in $(seq 1 30); do
            docker compose -f docker-compose.test.yml exec -T db-test pg_isready -U postgres && exit 0
            sleep 1
          done
          echo "db-test did not become ready in time" >&2
          exit 1

      - name: Build
        run: go build ./...

      - name: Test
        run: make test
